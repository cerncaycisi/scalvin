name: Bug report
description: Report a reproducible Scalvin framework or CLI defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not attach a real workspace, profile, session, transcript, source document, credential, or absolute private path. Replace personal content with a minimal synthetic example.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Install, update, doctor, backup, or restore
        - Safety behavior or safety hook
        - Consent, privacy, or data controls
        - Session runtime or memory
        - Persona, modality, or structure
        - Client adapter
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, using synthetic/private-data-free details?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or steps. Redact local paths and all personal data.
      placeholder: |
        1. Run ...
        2. With synthetic fixture ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Scalvin version or commit
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, Node version, and client
      placeholder: macOS 15, Node 22, Codex
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed real personal data, credentials, and private paths.
          required: true
        - label: This is not an undisclosed security vulnerability or safety bypass.
          required: true
